name: Daily Job Scraper

on:
  schedule:
    # Runs at 01:00 UTC (08:00 AM Vietnam Time GMT+7)
    - cron: '0 1 * * *' 
  workflow_dispatch: # Manual trigger for testing

jobs:
  scrape_and_upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          python -m playwright install chromium
          python -m playwright install-deps

      - name: Run Scraper Script with Retry Logic
        # This prevents failure notifications for simple network timeouts
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          command: python your_scraper_script.py
        env:
          # Use GitHub Secrets for security in your public repo
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Notify on Failure
        if: failure() # Only runs if the retry attempts all fail
        run: |
          echo "The Daily Scraper failed!"
          echo "Check the Run ID: ${{ github.run_id }}"
          echo "View logs at: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
