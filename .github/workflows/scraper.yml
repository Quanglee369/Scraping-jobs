name: Daily Modular Scraper

on:
  schedule:
    # 01:00 UTC = 08:00 AM Vietnam Time (GMT+7)
    - cron: '0 1 * * *' 
  workflow_dispatch: # Manual "Run Now" button

jobs:
  heavy_scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps

      - name: Run Heavy Scraper
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python script.py 

      - name: Save Scraped Data & Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-intermediate-data
          path: |
            df_master.csv
            scraper_debug.log
          retention-days: 1

  upload_to_supabase:
    needs: heavy_scrape # Wait for the scraper to finish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install DB & ML Libraries
        # We install only what upload_data.py needs for speed
        run: |
          pip install pandas numpy scikit-learn sqlalchemy psycopg2-binary

      - name: Download Scraped Data & Logs
        uses: actions/download-artifact@v4
        with:
          name: scraper-intermediate-data

      - name: Run Light Uploader
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python upload_data.py

      - name: Final Log Sync
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-execution-log-${{ github.run_id }}
          path: scraper_debug.log
          retention-days: 1
