name: Daily Job Scraper

on:
  schedule:
    # Runs at 01:00 UTC (08:00 AM Vietnam Time GMT+7)
    - cron: '0 1 * * *' 
  workflow_dispatch: # Allows you to click "Run Now" manually

jobs:
  scrape_and_upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          python -m playwright install chromium
          python -m playwright install-deps

      - name: Run Scraper Script with Retry
        # Retries up to 3 times to handle temporary network/DB blips
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: python script.py
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Upload Private Debug Log
        if: always() # Ensures the log is saved even if the script crashes
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug-log-${{ github.run_id }}
          path: scraper_debug.log
          retention-days: 1 # Automatically deletes after 24 hours for privacy

      - name: Notify on Failure
        if: failure() # Only triggers if the script fails after all retries
        run: |
          echo "The Daily Scraper failed!"
          echo "Run ID: ${{ github.run_id }}"
          echo "View logs at: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
